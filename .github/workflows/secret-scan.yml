name: Secret Scan

# Blocks secrets and internal-infra details (hostnames, SSH strings, server
# paths, keys) from landing in this PUBLIC repo. Rules + allowlist live in
# .gitleaks.toml. Scans the checked-out tree (CI clones tracked files only, so
# gitignored .env/.wrangler/etc. are never present), which avoids re-flagging
# historical commits.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan tracked files
        run: gitleaks detect --no-git --config .gitleaks.toml --redact --no-banner --exit-code 1

name: CodeQL

# Static analysis (SAST) for the storefront's JS/TS — injection/XSS/unsafe-flow
# safety net for the CMS-HTML sanitiser, the /api/* proxy, and payment paths.
# Free for public repos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

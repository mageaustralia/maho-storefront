name: Deploy Storefront

on:
  # Manual-only: the storefront ships via deploy.sh (local .env + wrangler.toml + bun).
  # Auto-deploy on push is intentionally disabled until a sanitized wrangler config
  # and CF_API_TOKEN / CF_ACCOUNT_ID secrets are wired up.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
